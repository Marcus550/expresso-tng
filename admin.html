<!DOCTYPE html>
<html lang="pt-br">

            </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const _supabase = supabase.createClient('https://apiznmmzyrxcpsephpre.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFwaXpubW16eXJ4Y3BzZXBocHJlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNzA1ODQsImV4cCI6MjA5MTk0NjU4NH0.jKgZuDlPeR3d_gCIQofAGz7dPU5g5BJ_xx4Ye_stnaw');

        async function carregarPropostas() {
            const { data, error } = await _supabase
                .from('orcamentos')
                .select('*')
                .order('created_at', { ascending: false });

            const lista = document.getElementById('lista-orcamentos');
            lista.innerHTML = data.map(o => `
                <div class="vaga-card" style="flex-direction: column; align-items: flex-start;">
                    <h3>${o.nome_empresa}</h3>
                    <p><strong>Serviço:</strong> ${o.servico}</p>
                    <p><strong>Contato:</strong> ${o.email} | ${o.telefone}</p>
                    <p style="color: #a0a0a0;">${o.mensagem}</p>
                </div>
            `).join('');
        }
        carregarPropostas();
    </script>
</body>
